<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <defs>
    <!-- Standard engineering hatching for cut steel -->
    <pattern id="h" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#555" stroke-width="0.65"/>
    </pattern>
    <!-- Denser hatching for pipe shoe (cut section) -->
    <pattern id="sh" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#334" stroke-width="0.8"/>
    </pattern>
    <!-- Wear pad (PTFE / sliding material): horizontal lines -->
    <pattern id="wp" patternUnits="userSpaceOnUse" width="5" height="3">
      <line x1="0" y1="1.5" x2="5" y2="1.5" stroke="#886633" stroke-width="0.7"/>
    </pattern>
    <radialGradient id="pg" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#E4EEF8"/>
      <stop offset="100%" stop-color="#7A96B2"/>
    </radialGradient>
    <marker id="a"  markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#222"/>
    </marker>
    <marker id="ba" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#775500"/>
    </marker>
    <marker id="sa" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#334477"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#FAFAFA"/>
  <rect x="4" y="4" width="612" height="412" fill="none" stroke="#333" stroke-width="1.2"/>
  <rect x="8" y="8" width="604" height="376" fill="none" stroke="#BBB" stroke-width="0.4"/>
  <line x1="312" y1="12" x2="312" y2="382" stroke="#CCC" stroke-width="0.8" stroke-dasharray="5,3"/>

  <text x="159" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">FRONT ELEVATION</text>
  <text x="463" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">END ELEVATION</text>
  <line x1="93"  y1="24" x2="225" y2="24" stroke="#AAA" stroke-width="0.5"/>
  <line x1="398" y1="24" x2="528" y2="24" stroke="#AAA" stroke-width="0.5"/>

  <!-- ╔══════════════════════════════════════════════════╗
       ║  FRONT ELEVATION                                  ║
       ║  Two-layer stack: pipe → shoe plate → PTFE pad   ║
       ╚══════════════════════════════════════════════════╝ -->

  <!-- I-beam -->
  <rect x="28"  y="340" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="150" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="28"  y="370" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Layer 2 (bottom): PTFE / wear pad — 8px thick, y=332 to y=340 -->
  <!-- Slightly wider than the shoe above it -->
  <rect x="48" y="332" width="218" height="8" fill="url(#wp)" stroke="#886633" stroke-width="1.2"/>
  <!-- Brown tint overlay so it reads as a distinct material -->
  <rect x="48" y="332" width="218" height="8" fill="rgba(200,150,60,0.18)" stroke="none"/>
  <!-- PTFE layer label tick marks (sliding surface marks) -->
  <line x1="68"  y1="332" x2="68"  y2="340" stroke="#886633" stroke-width="0.6"/>
  <line x1="98"  y1="332" x2="98"  y2="340" stroke="#886633" stroke-width="0.6"/>
  <line x1="128" y1="332" x2="128" y2="340" stroke="#886633" stroke-width="0.6"/>
  <line x1="158" y1="332" x2="158" y2="340" stroke="#886633" stroke-width="0.6"/>
  <line x1="188" y1="332" x2="188" y2="340" stroke="#886633" stroke-width="0.6"/>
  <line x1="218" y1="332" x2="218" y2="340" stroke="#886633" stroke-width="0.6"/>

  <!-- Layer 1 (top): Pipe shoe / base plate — 14px thick, y=318 to y=332 -->
  <rect x="60" y="318" width="194" height="14" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>

  <!-- Pipe (side view): bottom at shoe top y=318, r=47, cy=271 -->
  <rect x="62" y="224" width="188" height="94" fill="url(#pg)"/>
  <line x1="62" y1="224" x2="250" y2="224" stroke="#4A6A8A" stroke-width="1.5"/>
  <line x1="62" y1="318" x2="250" y2="318" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="62"  cy="271" rx="7" ry="47" fill="#AABCCE" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="250" cy="271" rx="7" ry="47" fill="none"    stroke="#7A9AB8" stroke-width="1"   stroke-dasharray="3,2"/>
  <rect x="68" y="226" width="175" height="14" rx="7" fill="rgba(255,255,255,0.40)"/>
  <line x1="40" y1="271" x2="268" y2="271" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- ── Labels (front view) ── -->
  <line x1="62"  y1="246" x2="30"  y2="228" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="11"   y="226"  font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <!-- Shoe plate label -->
  <line x1="60"  y1="325" x2="14"  y2="312" stroke="#334477" stroke-width="0.8" marker-end="url(#sa)"/>
  <text x="10"   y="309"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">PIPE SHOE</text>
  <text x="10"   y="320"  font-family="Arial,sans-serif" font-size="7.5" fill="#334477">(STEEL PLATE)</text>

  <!-- Wear pad label -->
  <line x1="48"  y1="336" x2="14"  y2="350" stroke="#775500" stroke-width="0.8" marker-end="url(#ba)"/>
  <text x="10"   y="362"  font-family="Arial,sans-serif" font-size="8.5" fill="#775500" font-weight="700">WEAR PAD</text>
  <text x="10"   y="373"  font-family="Arial,sans-serif" font-size="7.5" fill="#775500">(PTFE / SLIDING)</text>

  <!-- I-beam label -->
  <line x1="28"  y1="351" x2="14"  y2="382" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="284"  y="376"  font-family="Arial,sans-serif" font-size="8"   fill="#333">I-BEAM</text>

  <!-- ╔══════════════════════════════════════════╗
       ║  END ELEVATION  (right panel)             ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam end view -->
  <rect x="408" y="340" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>
  <rect x="458" y="350" width="14"  height="20" fill="#AAAAAA"  stroke="#222" stroke-width="1"/>
  <rect x="408" y="370" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>

  <!-- Wear pad (end view): widest layer, y=332-340 -->
  <rect x="400" y="332" width="126" height="8" fill="url(#wp)"  stroke="#886633" stroke-width="1.2"/>
  <rect x="400" y="332" width="126" height="8" fill="rgba(200,150,60,0.18)" stroke="none"/>

  <!-- Shoe plate (end view): narrower, y=318-332 -->
  <rect x="410" y="318" width="106" height="14" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>

  <!-- Pipe circle: bottom at y=318, cy=271, r=47 -->
  <circle cx="463" cy="271" r="47" fill="url(#pg)" stroke="#4A6A8A" stroke-width="1.5"/>
  <circle cx="463" cy="271" r="41" fill="none"     stroke="#7A9AB8" stroke-width="0.7" stroke-dasharray="2,2"/>
  <ellipse cx="447" cy="254" rx="12" ry="8" fill="rgba(255,255,255,0.46)"/>
  <line x1="463" y1="230" x2="463" y2="312" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>
  <line x1="422" y1="271" x2="504" y2="271" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- ── Labels (end view) ── -->
  <line x1="504" y1="254" x2="528" y2="241" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="531" y="239" font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <line x1="410" y1="325" x2="378" y2="314" stroke="#334477" stroke-width="0.8" marker-end="url(#sa)"/>
  <text x="320" y="311" font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">PIPE SHOE</text>

  <line x1="400" y1="336" x2="376" y2="350" stroke="#775500" stroke-width="0.8" marker-end="url(#ba)"/>
  <text x="320" y="360" font-family="Arial,sans-serif" font-size="8.5" fill="#775500" font-weight="700">WEAR PAD</text>

  <!-- Two-layer note -->
  <text x="318" y="372" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NOTE: TWO-LAYER ASSEMBLY — STEEL SHOE (TOP) +</text>
  <text x="318" y="381" font-family="Arial,sans-serif" font-size="7.5" fill="#666">PTFE/SLIDING PAD (BOTTOM) FOR THERMAL MOVEMENT.</text>

  <!-- Title block -->
  <rect x="4" y="388" width="612" height="28" fill="#003087"/>
  <text x="310" y="407" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">WEAR PAD ASSEMBLY  (WA)</text>
</svg>
