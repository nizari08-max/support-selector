<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4DB8"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>

  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>

  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam -->
  <rect x="68" y="214" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="224" width="16" height="20" fill="#374151"/>
  <rect x="68" y="244" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Bearing plate — flat plate between pipe and beam -->
  <rect x="118" y="198" width="144" height="16" rx="2" fill="url(#bg)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Plate hatch marks -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="1">
    <line x1="128" y1="198" x2="118" y2="214"/>
    <line x1="148" y1="198" x2="128" y2="214"/>
    <line x1="168" y1="198" x2="148" y2="214"/>
    <line x1="188" y1="198" x2="168" y2="214"/>
    <line x1="208" y1="198" x2="188" y2="214"/>
    <line x1="228" y1="198" x2="208" y2="214"/>
    <line x1="248" y1="198" x2="228" y2="214"/>
    <line x1="262" y1="198" x2="248" y2="214"/>
  </g>

  <!-- Pipe — bottom at y=198 → cy = 198-64 = 134 -->
  <circle cx="190" cy="134" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="116" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="119" x2="190" y2="149" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="134" x2="205" y2="134" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Dimension arrows for plate -->
  <line x1="118" y1="222" x2="262" y2="222" stroke="#94A3B8" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- Label -->
  <text x="300" y="207" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="600">BP02</text>
  <line x1="265" y1="206" x2="295" y2="206" stroke="#003087" stroke-width="0.8"/>

  <rect x="68" y="260" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="276" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">BEARING PLATE</text>
</svg>
