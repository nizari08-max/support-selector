<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <defs>
    <pattern id="h"  patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#555" stroke-width="0.65"/>
    </pattern>
    <!-- Denser hatching for the bearing plate (cut section) -->
    <pattern id="ph" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#333" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="pg" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#E4EEF8"/>
      <stop offset="100%" stop-color="#7A96B2"/>
    </radialGradient>
    <!-- Bearing plate gradient (steel blue) -->
    <linearGradient id="plg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9DB4CA"/>
      <stop offset="100%" stop-color="#5A7A96"/>
    </linearGradient>
    <marker id="a"  markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#222"/>
    </marker>
    <marker id="da" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#0044BB"/>
    </marker>
    <marker id="dra" markerWidth="5" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="5,0 5,5 0,2.5" fill="#0044BB"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#FAFAFA"/>
  <rect x="4" y="4" width="612" height="412" fill="none" stroke="#333" stroke-width="1.2"/>
  <rect x="8" y="8" width="604" height="376" fill="none" stroke="#BBB" stroke-width="0.4"/>
  <line x1="312" y1="12" x2="312" y2="382" stroke="#CCC" stroke-width="0.8" stroke-dasharray="5,3"/>

  <text x="159" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">FRONT ELEVATION</text>
  <text x="463" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">END ELEVATION</text>
  <line x1="93"  y1="24" x2="225" y2="24" stroke="#AAA" stroke-width="0.5"/>
  <line x1="398" y1="24" x2="528" y2="24" stroke="#AAA" stroke-width="0.5"/>

  <!-- ╔══════════════════════════════════════════╗
       ║  FRONT ELEVATION                          ║
       ║  Pipe on flat bearing plate on beam        ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam -->
  <rect x="28"  y="340" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="150" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="28"  y="370" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Bearing plate (front view): flat plate wider than pipe span, 12px thick -->
  <!-- Plate: y=328 to y=340, x=44 to x=270 (wider than pipe x=62-250) -->
  <rect x="44" y="328" width="226" height="12" fill="url(#ph)" stroke="#222" stroke-width="1.2"/>
  <!-- Plate side-edge shading -->
  <rect x="44"  y="328" width="4"  height="12" fill="#667"/>
  <rect x="266" y="328" width="4"  height="12" fill="#667"/>

  <!-- Pipe (side view): bottom at plate top y=328, r=47, cy=281 -->
  <rect x="62" y="234" width="188" height="94" fill="url(#pg)"/>
  <line x1="62" y1="234" x2="250" y2="234" stroke="#4A6A8A" stroke-width="1.5"/>
  <line x1="62" y1="328" x2="250" y2="328" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="62"  cy="281" rx="7" ry="47" fill="#AABCCE" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="250" cy="281" rx="7" ry="47" fill="none"    stroke="#7A9AB8" stroke-width="1"   stroke-dasharray="3,2"/>
  <rect x="68" y="236" width="175" height="14" rx="7" fill="rgba(255,255,255,0.40)"/>
  <line x1="40" y1="281" x2="268" y2="281" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Dimension line showing plate thickness -->
  <line x1="272" y1="328" x2="292" y2="328" stroke="#0044BB" stroke-width="0.7" marker-end="url(#da)"/>
  <line x1="272" y1="340" x2="292" y2="340" stroke="#0044BB" stroke-width="0.7" marker-end="url(#da)"/>
  <line x1="284" y1="326" x2="284" y2="342" stroke="#0044BB" stroke-width="0.7"/>
  <text x="287" y="336" font-family="Arial,sans-serif" font-size="7" fill="#0044BB">t</text>

  <!-- ── Labels ── -->
  <line x1="62"  y1="256" x2="30"  y2="237" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="11"   y="235"  font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <!-- BEARING PLATE callout -->
  <line x1="44"  y1="334" x2="14"  y2="320" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="10"   y="317"  font-family="Arial,sans-serif" font-size="8.5" fill="#111" font-weight="700">BEARING</text>
  <text x="10"   y="328"  font-family="Arial,sans-serif" font-size="8.5" fill="#111" font-weight="700">PLATE</text>

  <line x1="28"  y1="351" x2="14"  y2="364" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="9"    y="372"  font-family="Arial,sans-serif" font-size="8"   fill="#333">STRUCT.</text>
  <text x="9"    y="382"  font-family="Arial,sans-serif" font-size="8"   fill="#333">STEEL</text>

  <!-- ╔══════════════════════════════════════════╗
       ║  END ELEVATION  (right panel)             ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam end view -->
  <rect x="408" y="340" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>
  <rect x="458" y="350" width="14"  height="20" fill="#AAAAAA"  stroke="#222" stroke-width="1"/>
  <rect x="408" y="370" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>

  <!-- Bearing plate end view: wider rectangle under pipe -->
  <!-- Plate wider than pipe: x=400 to x=526 (126px), pipe diam=94px, centered 463 -->
  <rect x="400" y="328" width="126" height="12" fill="url(#ph)" stroke="#222" stroke-width="1.2"/>

  <!-- Pipe circle -->
  <!-- bottom at y=328, cy=281, r=47 -->
  <circle cx="463" cy="281" r="47" fill="url(#pg)" stroke="#4A6A8A" stroke-width="1.5"/>
  <circle cx="463" cy="281" r="41" fill="none"    stroke="#7A9AB8" stroke-width="0.7" stroke-dasharray="2,2"/>
  <ellipse cx="447" cy="264" rx="12" ry="8" fill="rgba(255,255,255,0.46)"/>
  <!-- Centrelines -->
  <line x1="463" y1="240" x2="463" y2="322" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>
  <line x1="422" y1="281" x2="504" y2="281" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- ── Labels (end view) ── -->
  <line x1="504" y1="263" x2="528" y2="250" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="531" y="248" font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <!-- Bearing plate label: arrow to plate edge -->
  <line x1="400" y1="334" x2="376" y2="348" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="320" y="358" font-family="Arial,sans-serif" font-size="8.5" fill="#111" font-weight="700">BEARING</text>
  <text x="322" y="368" font-family="Arial,sans-serif" font-size="8.5" fill="#111" font-weight="700">PLATE</text>

  <!-- Note plate is wider than pipe -->
  <text x="318" y="372" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NOTE: FLAT PLATE WIDER THAN PIPE DIAMETER.</text>
  <text x="318" y="381" font-family="Arial,sans-serif" font-size="7.5" fill="#666">PIPE BEARS ON PLATE; PLATE BEARS ON STEEL.</text>

  <!-- Title block -->
  <rect x="4" y="388" width="612" height="28" fill="#003087"/>
  <text x="310" y="407" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">BEARING PLATE  (BP02)</text>
</svg>
