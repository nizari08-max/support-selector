<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <defs>
    <pattern id="h"  patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#555" stroke-width="0.65"/>
    </pattern>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#225" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="pg" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#E4EEF8"/>
      <stop offset="100%" stop-color="#7A96B2"/>
    </radialGradient>
    <!-- Guide plate gradient (distinctive blue-steel) -->
    <linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5577AA"/>
      <stop offset="100%" stop-color="#334477"/>
    </linearGradient>
    <marker id="a"  markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#222"/>
    </marker>
    <marker id="ga" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#CC6600"/>
    </marker>
    <marker id="gar" markerWidth="5" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="5,0 5,5 0,2.5" fill="#CC6600"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#FAFAFA"/>
  <rect x="4" y="4" width="612" height="412" fill="none" stroke="#333" stroke-width="1.2"/>
  <rect x="8" y="8" width="604" height="376" fill="none" stroke="#BBB" stroke-width="0.4"/>
  <line x1="312" y1="12" x2="312" y2="382" stroke="#CCC" stroke-width="0.8" stroke-dasharray="5,3"/>

  <text x="159" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">FRONT ELEVATION</text>
  <text x="463" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">END ELEVATION</text>
  <line x1="93"  y1="24" x2="225" y2="24" stroke="#AAA" stroke-width="0.5"/>
  <line x1="398" y1="24" x2="528" y2="24" stroke="#AAA" stroke-width="0.5"/>

  <!-- ╔══════════════════════════════════════════════════════════╗
       ║  FRONT ELEVATION                                          ║
       ║  Pipe in shoe; vertical guide plates both sides w/ gap    ║
       ╚══════════════════════════════════════════════════════════╝ -->

  <!-- I-beam -->
  <rect x="28"  y="340" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="150" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="28"  y="370" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Base plate (shoe + guide base) -->
  <rect x="44" y="326" width="224" height="14" fill="url(#gh)" stroke="#222" stroke-width="1.2"/>

  <!-- Shoe lower section (between base plate and pipe) -->
  <rect x="80" y="285" width="152" height="41" fill="none" stroke="#4A6080" stroke-width="0" />
  <!-- Just show the curved saddle and sides lightly -->
  <rect x="80" y="300" width="16"  height="26" fill="url(#gh)" stroke="#222" stroke-width="1"/>
  <rect x="216" y="300" width="16" height="26" fill="url(#gh)" stroke="#222" stroke-width="1"/>

  <!-- LEFT GUIDE PLATE: x=44 to x=62, y=210 to y=326 (tall vertical plate) -->
  <rect x="44" y="210" width="18" height="116" fill="url(#gg)" stroke="#222" stroke-width="1.2"/>
  <!-- RIGHT GUIDE PLATE: x=250 to x=268 -->
  <rect x="250" y="210" width="18" height="116" fill="url(#gg)" stroke="#222" stroke-width="1.2"/>

  <!-- Pipe (side view): bottom at y=285, r=47, cy=238 -->
  <!-- Gap between guide plate face and pipe: left plate ends at x=62, pipe left at x=68 → 6px gap -->
  <rect x="68" y="191" width="176" height="94" fill="url(#pg)"/>
  <line x1="68" y1="191" x2="244" y2="191" stroke="#4A6A8A" stroke-width="1.5"/>
  <line x1="68" y1="285" x2="244" y2="285" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="68"  cy="238" rx="7" ry="47" fill="#AABCCE" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="244" cy="238" rx="7" ry="47" fill="none"    stroke="#7A9AB8" stroke-width="1"   stroke-dasharray="3,2"/>
  <rect x="74" y="193" width="163" height="14" rx="7" fill="rgba(255,255,255,0.40)"/>
  <!-- Pipe centreline -->
  <line x1="40" y1="238" x2="275" y2="238" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- GAP callout arrows (front view): at left and right gaps -->
  <!-- Left gap: between x=62 (plate face) and x=68 (pipe face), at mid-height y=238 -->
  <line x1="62" y1="238" x2="68" y2="238" stroke="#CC6600" stroke-width="1.2" marker-end="url(#ga)" marker-start="url(#gar)"/>
  <!-- Right gap -->
  <line x1="244" y1="238" x2="250" y2="238" stroke="#CC6600" stroke-width="1.2" marker-end="url(#ga)" marker-start="url(#gar)"/>

  <!-- ── Labels (front view) ── -->
  <line x1="68"  y1="213" x2="36"  y2="196" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="11"   y="194"  font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <!-- Guide plate label (left) -->
  <line x1="44"  y1="245" x2="14"  y2="230" stroke="#334477" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="10"   y="227"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">GUIDE</text>
  <text x="10"   y="238"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">PLATE</text>
  <text x="12"   y="249"  font-family="Arial,sans-serif" font-size="7.5" fill="#334477">(TYP.)</text>

  <!-- GAP label -->
  <line x1="65" y1="238" x2="14" y2="266" stroke="#CC6600" stroke-width="0.8" marker-end="url(#ga)"/>
  <text x="10"  y="276"  font-family="Arial,sans-serif" font-size="8.5" fill="#CC6600" font-weight="700">GAP</text>
  <text x="10"  y="287"  font-family="Arial,sans-serif" font-size="7.5" fill="#CC6600">(TYP. EACH</text>
  <text x="10"  y="297"  font-family="Arial,sans-serif" font-size="7.5" fill="#CC6600">SIDE)</text>

  <!-- Base plate label -->
  <line x1="44"  y1="333" x2="14"  y2="318" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="10"   y="315"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">BASE</text>
  <text x="10"   y="326"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">PLATE</text>

  <!-- Axial movement arrow (pipe free to slide in/out of view) -->
  <line x1="275" y1="238" x2="295" y2="238" stroke="#888" stroke-width="1" marker-end="url(#a)"/>
  <line x1="244" y1="220" x2="280" y2="220" stroke="#888" stroke-width="0.7"/>
  <text x="264"  y="216"  font-family="Arial,sans-serif" font-size="7.5" fill="#888">AXIAL</text>
  <text x="258"  y="209"  font-family="Arial,sans-serif" font-size="7.5" fill="#888">MOVEMENT</text>
  <text x="263"  y="202"  font-family="Arial,sans-serif" font-size="7.5" fill="#888">FREE →</text>

  <!-- ╔══════════════════════════════════════════╗
       ║  END ELEVATION  (right panel)             ║
       ║  Gap between guide plates and pipe         ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam end view -->
  <rect x="408" y="340" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>
  <rect x="458" y="350" width="14"  height="20" fill="#AAAAAA"  stroke="#222" stroke-width="1"/>
  <rect x="408" y="370" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>

  <!-- Base plate (end view) -->
  <rect x="404" y="326" width="118" height="14" fill="url(#gh)" stroke="#222" stroke-width="1.2"/>

  <!-- LEFT guide plate (end view) — thick vertical plate on left of pipe -->
  <!-- Pipe cx=463, r=47 → pipe left edge at x=416 -->
  <!-- Guide plate: x=396 to x=410, height from y=210 to y=326 -->
  <rect x="396" y="210" width="14" height="116" fill="url(#gg)" stroke="#222" stroke-width="1.2"/>
  <!-- RIGHT guide plate: right edge of pipe at x=510, plate: x=516 to x=530 -->
  <rect x="516" y="210" width="14" height="116" fill="url(#gg)" stroke="#222" stroke-width="1.2"/>

  <!-- Pipe circle: bottom at y=285, cy=238, r=47 -->
  <!-- Pipe left at x=416, right at x=510 -->
  <!-- Gap left: x=410 to x=416 = 6px; right: x=510 to x=516 = 6px -->
  <circle cx="463" cy="238" r="47" fill="url(#pg)" stroke="#4A6A8A" stroke-width="1.5"/>
  <circle cx="463" cy="238" r="41" fill="none"     stroke="#7A9AB8" stroke-width="0.7" stroke-dasharray="2,2"/>
  <ellipse cx="447" cy="221" rx="12" ry="8" fill="rgba(255,255,255,0.46)"/>
  <line x1="463" y1="197" x2="463" y2="279" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>
  <line x1="396" y1="238" x2="530" y2="238" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- GAP dimension arrows (end view): between plate face and pipe OD -->
  <!-- Left gap: from x=410 to x=416 at y=238 -->
  <line x1="410" y1="238" x2="416" y2="238" stroke="#CC6600" stroke-width="1.5" marker-end="url(#ga)" marker-start="url(#gar)"/>
  <!-- Right gap -->
  <line x1="510" y1="238" x2="516" y2="238" stroke="#CC6600" stroke-width="1.5" marker-end="url(#ga)" marker-start="url(#gar)"/>

  <!-- ── Labels (end view) ── -->
  <line x1="504" y1="221" x2="530" y2="208" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="533" y="206" font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <!-- Guide plate label (end view) -->
  <line x1="396" y1="252" x2="374" y2="266" stroke="#334477" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="318" y="274" font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">GUIDE PLATE</text>
  <text x="320" y="284" font-family="Arial,sans-serif" font-size="7.5" fill="#334477">(BOTH SIDES)</text>

  <!-- GAP label (end view) -->
  <line x1="413" y1="238" x2="392" y2="296" stroke="#CC6600" stroke-width="0.8" marker-end="url(#ga)"/>
  <text x="318" y="305" font-family="Arial,sans-serif" font-size="8.5" fill="#CC6600" font-weight="700">GAP (TYP.)</text>
  <text x="320" y="315" font-family="Arial,sans-serif" font-size="7.5" fill="#CC6600">LATERAL RESTRAINT,</text>
  <text x="320" y="324" font-family="Arial,sans-serif" font-size="7.5" fill="#CC6600">AXIAL MOVEMENT FREE</text>

  <!-- Note -->
  <text x="318" y="360" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NOTE: GUIDE PLATES PREVENT LATERAL MOVEMENT.</text>
  <text x="318" y="370" font-family="Arial,sans-serif" font-size="7.5" fill="#CC6600">GAP ALLOWS PIPE THERMAL EXPANSION ALONG AXIS.</text>
  <text x="318" y="381" font-family="Arial,sans-serif" font-size="7.5" fill="#666">IDENTICAL TO SHOE EXCEPT FOR ADDED GUIDE PLATES.</text>

  <!-- Title block -->
  <rect x="4" y="388" width="612" height="28" fill="#003087"/>
  <text x="310" y="407" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">GUIDE SUPPORT  (GL)</text>
</svg>
