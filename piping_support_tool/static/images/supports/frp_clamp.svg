<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <defs>
    <pattern id="h"  patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#555" stroke-width="0.65"/>
    </pattern>
    <pattern id="ch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#334" stroke-width="0.8"/>
    </pattern>
    <!-- Rubber / elastomer liner: wavy horizontal lines -->
    <pattern id="rb" patternUnits="userSpaceOnUse" width="8" height="5">
      <path d="M0,2.5 Q2,0 4,2.5 Q6,5 8,2.5" fill="none" stroke="#884400" stroke-width="0.8"/>
    </pattern>
    <!-- FRP pipe: green-tinted hatch to distinguish from steel -->
    <pattern id="fp" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#117733" stroke-width="0.7"/>
    </pattern>
    <!-- FRP pipe gradient (green tint) -->
    <radialGradient id="frp" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#D0F0D8"/>
      <stop offset="100%" stop-color="#4A9060"/>
    </radialGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8AA0B8"/>
      <stop offset="100%" stop-color="#4A6080"/>
    </linearGradient>
    <marker id="a"  markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#222"/>
    </marker>
    <marker id="ga" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#117733"/>
    </marker>
    <marker id="ra" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#884400"/>
    </marker>
    <marker id="ba" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#1E40AF"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#FAFAFA"/>
  <rect x="4" y="4" width="612" height="412" fill="none" stroke="#333" stroke-width="1.2"/>
  <rect x="8" y="8" width="604" height="376" fill="none" stroke="#BBB" stroke-width="0.4"/>
  <line x1="312" y1="12" x2="312" y2="382" stroke="#CCC" stroke-width="0.8" stroke-dasharray="5,3"/>

  <text x="159" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">FRONT ELEVATION</text>
  <text x="463" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">END ELEVATION</text>
  <line x1="93"  y1="24" x2="225" y2="24" stroke="#AAA" stroke-width="0.5"/>
  <line x1="398" y1="24" x2="528" y2="24" stroke="#AAA" stroke-width="0.5"/>

  <!-- ╔══════════════════════════════════════════════════════════════╗
       ║  FRONT ELEVATION                                              ║
       ║  Full-wrap clamp + rubber liner; NO WELD to FRP pipe          ║
       ╚══════════════════════════════════════════════════════════════╝ -->

  <!-- I-beam -->
  <rect x="28"  y="340" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="150" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="28"  y="370" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Clamp base plate -->
  <rect x="56" y="326" width="202" height="14" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- Lower clamp half ears (y=280 to y=326) -->
  <rect x="56"  y="280" width="16" height="46" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <rect x="242" y="280" width="16" height="46" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- RUBBER LINER strip visible inside lower clamp (bottom of pipe) -->
  <!-- Liner: y=278 to y=292 on each side (10px wide, between clamp and pipe) -->
  <rect x="72"  y="278" width="10" height="48" fill="url(#rb)" stroke="#884400" stroke-width="1"/>
  <rect x="72"  y="278" width="10" height="48" fill="rgba(200,100,20,0.18)" stroke="none"/>
  <rect x="232" y="278" width="10" height="48" fill="url(#rb)" stroke="#884400" stroke-width="1"/>
  <rect x="232" y="278" width="10" height="48" fill="rgba(200,100,20,0.18)" stroke="none"/>

  <!-- FRP Pipe (DIFFERENT colour — green tint): bottom at y=278, r=47, cy=231 -->
  <rect x="82" y="184" width="150" height="94" fill="url(#frp)"/>
  <line x1="82"  y1="184" x2="232" y2="184" stroke="#3A7050" stroke-width="1.5"/>
  <line x1="82"  y1="278" x2="232" y2="278" stroke="#3A7050" stroke-width="1.5"/>
  <ellipse cx="82"  cy="231" rx="7" ry="47" fill="#8CC8A0" stroke="#3A7050" stroke-width="1.5"/>
  <ellipse cx="232" cy="231" rx="7" ry="47" fill="none"    stroke="#4A9068" stroke-width="1"   stroke-dasharray="3,2"/>
  <!-- FRP laminate lines (thin horizontal bands suggesting composite layers) -->
  <line x1="82" y1="205" x2="232" y2="205" stroke="rgba(20,140,60,0.25)" stroke-width="1.5"/>
  <line x1="82" y1="218" x2="232" y2="218" stroke="rgba(20,140,60,0.25)" stroke-width="1.5"/>
  <line x1="82" y1="244" x2="232" y2="244" stroke="rgba(20,140,60,0.25)" stroke-width="1.5"/>
  <line x1="82" y1="257" x2="232" y2="257" stroke="rgba(20,140,60,0.25)" stroke-width="1.5"/>
  <rect x="88" y="186" width="137" height="14" rx="7" fill="rgba(255,255,255,0.40)"/>
  <!-- Pipe centreline -->
  <line x1="50" y1="231" x2="258" y2="231" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Upper clamp half ears + top bar -->
  <!-- Left upper ear -->
  <rect x="56"  y="184" width="16" height="47" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <rect x="242" y="184" width="16" height="47" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <rect x="56"  y="170" width="202" height="14" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- Rubber liner on upper side too -->
  <rect x="72"  y="184" width="10" height="47" fill="url(#rb)" stroke="#884400" stroke-width="1"/>
  <rect x="72"  y="184" width="10" height="47" fill="rgba(200,100,20,0.18)" stroke="none"/>
  <rect x="232" y="184" width="10" height="47" fill="url(#rb)" stroke="#884400" stroke-width="1"/>
  <rect x="232" y="184" width="10" height="47" fill="rgba(200,100,20,0.18)" stroke="none"/>

  <!-- BOLTS on each side -->
  <line x1="64"  y1="166" x2="64"  y2="330" stroke="#1E40AF" stroke-width="1.2"/>
  <rect x="58"   y="166" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>
  <rect x="58"   y="323" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>
  <line x1="250" y1="166" x2="250" y2="330" stroke="#1E40AF" stroke-width="1.2"/>
  <rect x="244"  y="166" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>
  <rect x="244"  y="323" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>

  <!-- NO WELD badge -->
  <rect x="104" y="155" width="106" height="16" rx="3" fill="#FFEEEE" stroke="#CC2200" stroke-width="1"/>
  <text x="157" y="167" text-anchor="middle" font-family="Arial,sans-serif" font-size="8.5" fill="#CC2200" font-weight="700">NO WELDING TO PIPE</text>

  <!-- ── Labels (front view) ── -->
  <line x1="82"  y1="206" x2="50"  y2="190" stroke="#117733" stroke-width="0.8" marker-end="url(#ga)"/>
  <text x="11"   y="188"  font-family="Arial,sans-serif" font-size="9"   fill="#117733" font-weight="700">FRP PIPE</text>

  <!-- Rubber liner label -->
  <line x1="72"  y1="300" x2="30"  y2="316" stroke="#884400" stroke-width="0.8" marker-end="url(#ra)"/>
  <text x="10"   y="322"  font-family="Arial,sans-serif" font-size="8.5" fill="#884400" font-weight="700">RUBBER</text>
  <text x="10"   y="333"  font-family="Arial,sans-serif" font-size="8.5" fill="#884400" font-weight="700">LINER</text>

  <!-- Clamp label -->
  <line x1="56"  y1="305" x2="14"  y2="288" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="10"   y="285"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">STEEL</text>
  <text x="10"   y="296"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">CLAMP</text>

  <!-- Bolt label -->
  <line x1="258" y1="231" x2="276" y2="215" stroke="#1E40AF" stroke-width="0.8" marker-end="url(#ba)"/>
  <text x="270"  y="210"  font-family="Arial,sans-serif" font-size="8.5" fill="#1E40AF" font-weight="700">BOLT &amp; NUT</text>

  <!-- ╔══════════════════════════════════════════╗
       ║  END ELEVATION  (right panel)             ║
       ║  Rubber liner ring clearly visible         ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam end view -->
  <rect x="408" y="340" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>
  <rect x="458" y="350" width="14"  height="20" fill="#AAAAAA"  stroke="#222" stroke-width="1"/>
  <rect x="408" y="370" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>

  <!-- Base plate end view -->
  <rect x="413" y="326" width="100" height="14" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- FULL CLAMP (end view): outer steel ring with rubber liner inside -->
  <!-- Outer steel clamp: r=62 (from pipe center) -->
  <!-- Rubber liner ring: r=47 to r=57 (10px thick) -->
  <!-- FRP pipe: r=47 -->

  <!-- Lower half: outer clamp (grey-steel) -->
  <path d="M 401,231 A 62,62 0 0 0 525,231 Z" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <!-- Upper half: outer clamp -->
  <path d="M 401,231 A 62,62 0 0 1 525,231 Z" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- Rubber liner ring (inside clamp, outside pipe): orange wavy fill -->
  <circle cx="463" cy="231" r="57" fill="url(#rb)" stroke="#884400" stroke-width="1"/>
  <circle cx="463" cy="231" r="57" fill="rgba(200,100,20,0.20)" stroke="none"/>
  <!-- Mask out the centre (pipe area) -->
  <circle cx="463" cy="231" r="47" fill="#FAFAFA" stroke="none"/>

  <!-- FRP Pipe circle (green tint) -->
  <circle cx="463" cy="231" r="47" fill="url(#frp)" stroke="#3A7050" stroke-width="1.5"/>
  <!-- FRP laminate ring hints -->
  <circle cx="463" cy="231" r="41" fill="none" stroke="rgba(20,140,60,0.20)" stroke-width="2"/>
  <circle cx="463" cy="231" r="35" fill="none" stroke="rgba(20,140,60,0.15)" stroke-width="1.5"/>
  <!-- Highlight -->
  <ellipse cx="447" cy="214" rx="12" ry="8" fill="rgba(255,255,255,0.46)"/>
  <!-- Centrelines -->
  <line x1="463" y1="190" x2="463" y2="272" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>
  <line x1="401" y1="231" x2="525" y2="231" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Bolt circles on each side -->
  <circle cx="401" cy="231" r="7"  fill="#333" stroke="#1E40AF" stroke-width="1.5"/>
  <circle cx="401" cy="231" r="3"  fill="#1E40AF"/>
  <circle cx="525" cy="231" r="7"  fill="#333" stroke="#1E40AF" stroke-width="1.5"/>
  <circle cx="525" cy="231" r="3"  fill="#1E40AF"/>
  <!-- Split line -->
  <line x1="408" y1="231" x2="518" y2="231" stroke="#888" stroke-width="0.7" stroke-dasharray="3,2"/>

  <!-- ── Labels (end view) ── -->
  <line x1="504" y1="214" x2="530" y2="201" stroke="#117733" stroke-width="0.8" marker-end="url(#ga)"/>
  <text x="533" y="199" font-family="Arial,sans-serif" font-size="9"   fill="#117733" font-weight="700">FRP PIPE</text>

  <!-- Rubber liner ring label (pointing to the orange ring) -->
  <!-- r=52 midpoint, top-right at approx x=499, y=195 -->
  <line x1="499" y1="195" x2="524" y2="182" stroke="#884400" stroke-width="0.8" marker-end="url(#ra)"/>
  <text x="318" y="175" font-family="Arial,sans-serif" font-size="8.5" fill="#884400" font-weight="700">RUBBER LINER</text>
  <text x="320" y="186" font-family="Arial,sans-serif" font-size="7.5" fill="#884400">(ELASTOMER PAD)</text>

  <!-- Steel clamp label -->
  <!-- r=60, top at approx x=463, y=171 -->
  <line x1="463" y1="169" x2="440" y2="156" stroke="#334477" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="318" y="153" font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">STEEL CLAMP</text>
  <text x="320" y="164" font-family="Arial,sans-serif" font-size="7.5" fill="#334477">(BOLTED, NOT WELDED)</text>

  <line x1="525" y1="224" x2="548" y2="211" stroke="#1E40AF" stroke-width="0.8" marker-end="url(#ba)"/>
  <text x="551" y="209" font-family="Arial,sans-serif" font-size="8.5" fill="#1E40AF" font-weight="700">BOLT</text>

  <!-- Note -->
  <text x="318" y="350" font-family="Arial,sans-serif" font-size="7.5" fill="#117733" font-weight="700">FRP PIPE: NO WELDING PERMITTED.</text>
  <text x="318" y="361" font-family="Arial,sans-serif" font-size="7.5" fill="#666">ELASTOMER LINER PROTECTS FRP LAMINATE.</text>
  <text x="318" y="372" font-family="Arial,sans-serif" font-size="7.5" fill="#334477">CLAMP HALVES BOLTED TOGETHER AROUND PIPE.</text>
  <text x="318" y="381" font-family="Arial,sans-serif" font-size="7.5" fill="#666">SEE ALSO SC71 / SC72 (SADDLE TYPE) FOR LARGE FRP.</text>

  <!-- Title block -->
  <rect x="4" y="388" width="612" height="28" fill="#003087"/>
  <text x="310" y="407" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">FRP CLAMP SHOE  (CF / SC71–73)</text>
</svg>
