<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <defs>
    <pattern id="h" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#555" stroke-width="0.65"/>
    </pattern>
    <radialGradient id="pg" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#E4EEF8"/>
      <stop offset="100%" stop-color="#7A96B2"/>
    </radialGradient>
    <marker id="a" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#222"/>
    </marker>
    <marker id="ra" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#CC2200"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#FAFAFA"/>
  <rect x="4" y="4" width="612" height="412" fill="none" stroke="#333" stroke-width="1.2"/>
  <rect x="8" y="8" width="604" height="376" fill="none" stroke="#BBB" stroke-width="0.4"/>
  <line x1="312" y1="12" x2="312" y2="382" stroke="#CCC" stroke-width="0.8" stroke-dasharray="5,3"/>

  <text x="159" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">FRONT ELEVATION</text>
  <text x="463" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">END ELEVATION</text>
  <line x1="93"  y1="24" x2="225" y2="24" stroke="#AAA" stroke-width="0.5"/>
  <line x1="398" y1="24" x2="528" y2="24" stroke="#AAA" stroke-width="0.5"/>

  <!-- ╔══════════════════════════════════════════╗
       ║  FRONT ELEVATION  (left panel)            ║
       ║  Pipe bottom touches beam — no element    ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam: top flange, web, bottom flange — hatched flanges -->
  <rect x="28"  y="340" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="150" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="28"  y="370" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Pipe (side view): rectangle + end caps -->
  <!-- bottom at y=340 (beam top), radius 47 px, center y=293 -->
  <rect x="62" y="246" width="188" height="94" fill="url(#pg)"/>
  <line x1="62" y1="246" x2="250" y2="246" stroke="#4A6A8A" stroke-width="1.5"/>
  <line x1="62" y1="340" x2="250" y2="340" stroke="#4A6A8A" stroke-width="1.5"/>
  <!-- Left cap (near face) -->
  <ellipse cx="62"  cy="293" rx="7" ry="47" fill="#AABCCE" stroke="#4A6A8A" stroke-width="1.5"/>
  <!-- Right cap (far face, dashed = hidden) -->
  <ellipse cx="250" cy="293" rx="7" ry="47" fill="none"    stroke="#7A9AB8" stroke-width="1"   stroke-dasharray="3,2"/>
  <!-- Specular highlight strip along top of pipe -->
  <rect x="68" y="248" width="175" height="14" rx="7" fill="rgba(255,255,255,0.40)"/>
  <!-- Pipe centreline (chain-dot, blue) -->
  <line x1="40" y1="293" x2="268" y2="293" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Direct-contact indicator: three red filled circles on contact line -->
  <circle cx="118" cy="340" r="2.8" fill="#CC2200"/>
  <circle cx="156" cy="340" r="2.8" fill="#CC2200"/>
  <circle cx="194" cy="340" r="2.8" fill="#CC2200"/>

  <!-- ── Leader labels ── -->
  <line x1="62"  y1="268" x2="30"  y2="249" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="11"   y="247"  font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <line x1="156" y1="340" x2="106" y2="321" stroke="#CC2200" stroke-width="0.8" marker-end="url(#ra)"/>
  <text x="10"   y="318"  font-family="Arial,sans-serif" font-size="8.5" fill="#CC2200" font-weight="700">DIRECT CONTACT</text>
  <text x="12"   y="329"  font-family="Arial,sans-serif" font-size="7.5" fill="#CC2200">(NO SHOE / PLATE)</text>

  <line x1="28"  y1="351" x2="14"  y2="364" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="9"    y="373"  font-family="Arial,sans-serif" font-size="8"   fill="#333">STRUCT.</text>
  <text x="9"    y="383"  font-family="Arial,sans-serif" font-size="8"   fill="#333">STEEL</text>

  <!-- ╔══════════════════════════════════════════╗
       ║  END ELEVATION  (right panel)             ║
       ║  Pipe circle directly on beam flange      ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam end-view (cross-section, hatched) -->
  <rect x="408" y="340" width="110" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="458" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="408" y="370" width="110" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Pipe circle -->
  <!-- bottom at y=340, center y=293, r=47 -->
  <circle cx="463" cy="293" r="47" fill="url(#pg)" stroke="#4A6A8A" stroke-width="1.5"/>
  <!-- Inner wall dashed ring -->
  <circle cx="463" cy="293" r="41" fill="none" stroke="#7A9AB8" stroke-width="0.7" stroke-dasharray="2,2"/>
  <!-- Highlight -->
  <ellipse cx="447" cy="276" rx="12" ry="8" fill="rgba(255,255,255,0.46)"/>
  <!-- Centrelines -->
  <line x1="463" y1="252" x2="463" y2="334" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>
  <line x1="422" y1="293" x2="504" y2="293" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Contact dot at bottom of pipe / top of beam -->
  <circle cx="463" cy="340" r="3" fill="#CC2200"/>

  <!-- ── Labels ── -->
  <line x1="504" y1="276" x2="528" y2="262" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="531" y="260" font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <line x1="518" y1="345" x2="534" y2="358" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="537" y="362" font-family="Arial,sans-serif" font-size="8"   fill="#333">I-BEAM</text>

  <!-- Note text -->
  <text x="318" y="371" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NOTE: PIPE RESTS DIRECTLY ON STRUCTURAL STEEL.</text>
  <text x="318" y="381" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NO SHOE, BEARING PLATE, OR WEAR PAD USED.</text>

  <!-- Title block -->
  <rect x="4" y="388" width="612" height="28" fill="#003087"/>
  <text x="310" y="407" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">DIRECT REST</text>
</svg>
