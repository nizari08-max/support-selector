<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="hd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
    <marker id="up_arr" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
      <path d="M0,8 L4,0 L8,8 z" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>

  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>

  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam -->
  <rect x="68" y="214" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="224" width="16" height="20" fill="#374151"/>
  <rect x="68" y="244" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Base plate -->
  <rect x="108" y="202" width="164" height="12" rx="2" fill="url(#hd)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Pipe — cy=138, r=64 → bottom at y=202 -->
  <circle cx="190" cy="138" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="120" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="123" x2="190" y2="153" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="138" x2="205" y2="138" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Hold-down U-bolt going OVER the pipe -->
  <!-- Left leg -->
  <rect x="150" y="74" width="14" height="128" rx="5" fill="url(#hd)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Right leg -->
  <rect x="216" y="74" width="14" height="128" rx="5" fill="url(#hd)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Top bar (horizontal bridge) -->
  <rect x="150" y="70" width="80" height="14" rx="5" fill="url(#hd)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Highlight on bar -->
  <rect x="154" y="72" width="72" height="5" rx="3" fill="rgba(147,197,253,0.25)"/>

  <!-- Nut/washer at base of legs -->
  <rect x="146" y="200" width="22" height="10" rx="2" fill="#374151" stroke="#60A5FA" stroke-width="1"/>
  <rect x="212" y="200" width="22" height="10" rx="2" fill="#374151" stroke="#60A5FA" stroke-width="1"/>

  <!-- Uplift force arrow -->
  <line x1="190" y1="62" x2="190" y2="40" stroke="#EF4444" stroke-width="2.5" marker-end="url(#up_arr)"/>
  <text x="196" y="50" font-family="'Arial',sans-serif" font-size="8" fill="#EF4444" font-weight="700">UPLIFT</text>

  <!-- Label callout -->
  <text x="300" y="140" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="700">GH01 / GH02</text>
  <line x1="258" y1="138" x2="297" y2="138" stroke="#003087" stroke-width="0.8"/>

  <rect x="68" y="258" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="274" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">HOLD DOWN SUPPORT</text>
</svg>
