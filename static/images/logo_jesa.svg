<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">

  <!-- ═══════════════════════════════════════
       GEOMETRIC MARK  (left side)
       Three stacked horizontal bars that taper
       into a sharp right point — engineering /
       forward-motion feel, similar to JESA style
  ════════════════════════════════════════════ -->

  <!-- Top bar -->
  <polygon points="0,4  38,4  46,14  38,14  0,14"  fill="white"/>
  <!-- Middle bar (widest, primary) -->
  <polygon points="0,18  42,18  52,28  42,38  0,38"  fill="white"/>
  <!-- Bottom bar -->
  <polygon points="0,42  38,42  46,52  38,52  0,52" fill="white"/>

  <!-- Inner accent stripe on middle bar -->
  <polygon points="6,22  36,22  44,28  36,34  6,34"  fill="#003087"/>

  <!-- ═══════════════════════════════════════
       WORDMARK  — "JESA"
  ════════════════════════════════════════════ -->
  <text
    x="62" y="36"
    font-family="'Arial Black','Franklin Gothic Heavy','Impact',Arial,sans-serif"
    font-size="30"
    font-weight="900"
    fill="white"
    letter-spacing="3">JESA</text>

  <!-- Thin orange rule under the wordmark -->
  <rect x="62" y="42" width="148" height="2.5" rx="1.2" fill="#F47920"/>

</svg>
