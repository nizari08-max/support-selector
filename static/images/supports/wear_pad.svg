<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="wp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <marker id="slide_arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#60A5FA"/>
    </marker>
    <marker id="slide_arr_l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 z" fill="#60A5FA"/>
    </marker>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>
  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>
  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam structural steel — top flange at y=216 -->
  <rect x="68" y="216" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="226" width="16" height="20" fill="#374151"/>
  <rect x="68" y="246" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Wear Pad arc bonded to pipe OD bottom -->
  <!-- Pipe cy=128, r=64 → bottom at y=192; pad thickness=10px → outer bottom y=202 -->
  <!-- Pad spans ±65° from bottom -->
  <!-- inner ±65°: x=190±58=132,248; y=128+27=155 -->
  <!-- outer ±65° (r=74): x=190±67=123,257; y=128+31=159 -->
  <path d="M 132,155 A 64 64 0 0 1 248,155 L 257,159 A 74 74 0 0 0 123,159 Z"
        fill="url(#wp)" stroke="#C2410C" stroke-width="1.5"/>
  <!-- pad texture — diagonal hatch lines suggesting bonded material -->
  <g stroke="rgba(255,255,255,0.30)" stroke-width="1">
    <line x1="136" y1="158" x2="130" y2="171"/><line x1="150" y1="163" x2="145" y2="177"/>
    <line x1="165" y1="166" x2="161" y2="181"/><line x1="181" y1="168" x2="178" y2="183"/>
    <line x1="197" y1="168" x2="195" y2="183"/><line x1="213" y1="167" x2="211" y2="182"/>
    <line x1="228" y1="164" x2="227" y2="178"/><line x1="243" y1="159" x2="244" y2="173"/>
  </g>

  <!-- Pipe (steel) — cy=128, r=64 -->
  <circle cx="190" cy="128" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="110" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="113" x2="190" y2="143" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="128" x2="205" y2="128" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- "BONDED TO PIPE OD" annotation with small arrows -->
  <line x1="190" y1="178" x2="190" y2="193" stroke="#C2410C" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="16" y="176" font-family="'Arial',sans-serif" font-size="8" fill="#C2410C" font-weight="600">BONDED TO</text>
  <text x="16" y="186" font-family="'Arial',sans-serif" font-size="8" fill="#C2410C" font-weight="600">PIPE OD</text>
  <line x1="62" y1="180" x2="123" y2="170" stroke="#C2410C" stroke-width="0.7" stroke-dasharray="3,2"/>

  <!-- Sliding freedom arrows at bottom of pad -->
  <line x1="162" y1="210" x2="142" y2="210" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#slide_arr_l)"/>
  <line x1="218" y1="210" x2="238" y2="210" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#slide_arr)"/>
  <text x="167" y="221" font-family="'Arial',sans-serif" font-size="7.5" fill="#60A5FA" font-weight="600" text-anchor="middle">SLIDES ON STRUCTURE</text>

  <!-- Labels -->
  <text x="296" y="120" font-family="'Arial',sans-serif" font-size="8.5" fill="#475569" font-weight="700">PIPE</text>
  <line x1="256" y1="116" x2="293" y2="118" stroke="#475569" stroke-width="0.8"/>

  <text x="296" y="165" font-family="'Arial',sans-serif" font-size="8.5" fill="#EA580C" font-weight="700">WA01/WA02/WA03</text>
  <text x="296" y="175" font-family="'Arial',sans-serif" font-size="7" fill="#EA580C">WEAR PAD</text>
  <line x1="257" y1="162" x2="293" y2="163" stroke="#EA580C" stroke-width="0.8"/>

  <rect x="68" y="260" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="276" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">WEAR PAD ASSEMBLY</text>
</svg>
