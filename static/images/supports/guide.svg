<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="guide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
    <marker id="axial_r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#64748B"/>
    </marker>
    <marker id="axial_l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 z" fill="#64748B"/>
    </marker>
    <marker id="gap_r" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#F59E0B"/>
    </marker>
    <marker id="gap_l" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>
  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>
  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam structural steel — top flange at y=212 -->
  <rect x="68" y="212" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="222" width="16" height="18" fill="#374151"/>
  <rect x="68" y="240" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Base plate — spans full guide width -->
  <rect x="96" y="200" width="188" height="12" rx="2" fill="url(#guide)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Left guide plate — x=96 to x=118 (22px wide), y=100 to y=200 -->
  <rect x="96" y="100" width="22" height="100" rx="2" fill="url(#guide)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Right guide plate — x=262 to x=284 -->
  <rect x="262" y="100" width="22" height="100" rx="2" fill="url(#guide)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Clearance gap indicators (amber) between guide plates and pipe -->
  <!-- Pipe side edges at x=126 and x=254 (r=64, cx=190) -->
  <!-- Left gap: x=118 to x=126 -->
  <rect x="118" y="126" width="8" height="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="2,1"/>
  <!-- Right gap: x=254 to x=262 -->
  <rect x="254" y="126" width="8" height="28" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="2,1"/>
  <!-- Gap arrows -->
  <line x1="119" y1="140" x2="125" y2="140" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#gap_r)" marker-start="url(#gap_l)"/>
  <line x1="255" y1="140" x2="261" y2="140" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#gap_r)" marker-start="url(#gap_l)"/>

  <!-- Pipe — cx=190, cy=140, r=64 → sides at x=126 and x=254 -->
  <circle cx="190" cy="140" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="122" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="125" x2="190" y2="155" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="140" x2="205" y2="140" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Axial freedom arrow (pipe slides in/out of page) — shown as double-headed at top -->
  <text x="190" y="64" text-anchor="middle" font-family="'Arial',sans-serif" font-size="8" fill="#64748B" font-weight="600">AXIAL MOVEMENT FREE</text>
  <line x1="152" y1="56" x2="134" y2="56" stroke="#64748B" stroke-width="1.5" marker-end="url(#axial_l)"/>
  <line x1="228" y1="56" x2="246" y2="56" stroke="#64748B" stroke-width="1.5" marker-end="url(#axial_r)"/>
  <line x1="152" y1="56" x2="228" y2="56" stroke="#64748B" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Gap label -->
  <text x="16" y="139" font-family="'Arial',sans-serif" font-size="7.5" fill="#D97706" font-weight="700">THERMAL</text>
  <text x="16" y="149" font-family="'Arial',sans-serif" font-size="7.5" fill="#D97706" font-weight="700">GAP</text>
  <line x1="46" y1="144" x2="118" y2="140" stroke="#D97706" stroke-width="0.7" stroke-dasharray="3,2"/>

  <!-- Labels -->
  <text x="296" y="136" font-family="'Arial',sans-serif" font-size="8.5" fill="#475569" font-weight="700">PIPE</text>
  <line x1="256" y1="132" x2="293" y2="134" stroke="#475569" stroke-width="0.8"/>

  <text x="296" y="158" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="700">GL01 / GL02</text>
  <text x="296" y="168" font-family="'Arial',sans-serif" font-size="7" fill="#003087">GUIDE PLATES</text>
  <line x1="284" y1="152" x2="293" y2="155" stroke="#003087" stroke-width="0.8"/>

  <rect x="68" y="258" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="274" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">GUIDE SUPPORT</text>
</svg>
