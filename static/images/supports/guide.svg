<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="guide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>

  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>

  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam -->
  <rect x="68" y="212" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="222" width="16" height="20" fill="#374151"/>
  <rect x="68" y="242" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Base plate -->
  <rect x="100" y="200" width="180" height="12" rx="2" fill="url(#guide)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Left guide plate — gap from pipe -->
  <rect x="96" y="104" width="22" height="96" rx="2" fill="url(#guide)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Right guide plate — gap from pipe -->
  <rect x="262" y="104" width="22" height="96" rx="2" fill="url(#guide)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Pipe — cx=190, cy=140, r=64 → sides at x=126 and x=254 -->
  <!-- Clearance gap shown between guide plates (96, 118) and pipe sides (126, 254) -->
  <circle cx="190" cy="140" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="122" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="125" x2="190" y2="155" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="140" x2="205" y2="140" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Clearance gap callout arrows -->
  <line x1="118" y1="140" x2="126" y2="140" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="2,1"/>
  <line x1="254" y1="140" x2="262" y2="140" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="2,1"/>

  <!-- Axial freedom arrows (pipe can slide in/out of screen) -->
  <text x="160" y="52" font-family="'Arial',sans-serif" font-size="8" fill="#64748B" text-anchor="middle">AXIAL MOVEMENT FREE</text>
  <line x1="130" y1="56" x2="110" y2="56" stroke="#64748B" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="190" y1="56" x2="210" y2="56" stroke="#64748B" stroke-width="1"/>

  <!-- Label callout -->
  <text x="302" y="150" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="700">GL01 / GL02</text>
  <line x1="284" y1="148" x2="298" y2="148" stroke="#003087" stroke-width="0.8"/>

  <rect x="68" y="258" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="274" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">GUIDE SUPPORT</text>
</svg>
