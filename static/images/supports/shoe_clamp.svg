<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <defs>
    <pattern id="h"  patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#555" stroke-width="0.65"/>
    </pattern>
    <pattern id="ch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#334" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="pg" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#E4EEF8"/>
      <stop offset="100%" stop-color="#7A96B2"/>
    </radialGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8AA0B8"/>
      <stop offset="100%" stop-color="#4A6080"/>
    </linearGradient>
    <marker id="a"  markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#222"/>
    </marker>
    <marker id="ba" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#1E40AF"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#FAFAFA"/>
  <rect x="4" y="4" width="612" height="412" fill="none" stroke="#333" stroke-width="1.2"/>
  <rect x="8" y="8" width="604" height="376" fill="none" stroke="#BBB" stroke-width="0.4"/>
  <line x1="312" y1="12" x2="312" y2="382" stroke="#CCC" stroke-width="0.8" stroke-dasharray="5,3"/>

  <text x="159" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">FRONT ELEVATION</text>
  <text x="463" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">END ELEVATION</text>
  <line x1="93"  y1="24" x2="225" y2="24" stroke="#AAA" stroke-width="0.5"/>
  <line x1="398" y1="24" x2="528" y2="24" stroke="#AAA" stroke-width="0.5"/>

  <!-- ╔══════════════════════════════════════════════════════════╗
       ║  FRONT ELEVATION                                          ║
       ║  Split clamp (upper + lower halves) bolted; base on beam  ║
       ╚══════════════════════════════════════════════════════════╝ -->

  <!-- I-beam -->
  <rect x="28"  y="340" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="150" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="28"  y="370" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Clamp base plate (lower clamped saddle extends to base plate on beam) -->
  <rect x="56" y="326" width="202" height="14" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- Lower clamp half: two side ears + saddle (y=285 to y=326) -->
  <!-- Left ear -->
  <rect x="56" y="280" width="16" height="46" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <!-- Right ear -->
  <rect x="242" y="280" width="16" height="46" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <!-- Lower saddle hint (arc) at pipe bottom -->
  <path d="M 72,280 Q 156,296 242,280" fill="none" stroke="#4A6080" stroke-width="1.5"/>

  <!-- Pipe (side view): bottom at y=280, r=47, cy=233 -->
  <rect x="62" y="186" width="188" height="94" fill="url(#pg)"/>
  <line x1="62" y1="186" x2="250" y2="186" stroke="#4A6A8A" stroke-width="1.5"/>
  <line x1="62" y1="280" x2="250" y2="280" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="62"  cy="233" rx="7" ry="47" fill="#AABCCE" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="250" cy="233" rx="7" ry="47" fill="none"    stroke="#7A9AB8" stroke-width="1"   stroke-dasharray="3,2"/>
  <rect x="68" y="188" width="175" height="14" rx="7" fill="rgba(255,255,255,0.40)"/>
  <line x1="40" y1="233" x2="268" y2="233" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Upper clamp half: two side ears + top bar (above pipe) -->
  <!-- Left upper ear -->
  <rect x="56" y="186" width="16" height="47" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <!-- Right upper ear -->
  <rect x="242" y="186" width="16" height="47" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <!-- Upper clamp top bar -->
  <rect x="56" y="172" width="202" height="14" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- BOLT lines on left side (2 bolts): vertical line through both ears at x=64 -->
  <!-- Bolt 1 (upper) -->
  <line x1="64" y1="168" x2="64" y2="330" stroke="#1E40AF" stroke-width="1.2"/>
  <rect x="58" y="168" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>
  <rect x="58" y="323" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>
  <!-- Bolt 2 (lower) — same shank, secondary nut indicator -->
  <!-- Right side bolt -->
  <line x1="250" y1="168" x2="250" y2="330" stroke="#1E40AF" stroke-width="1.2"/>
  <rect x="244" y="168" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>
  <rect x="244" y="323" width="12" height="7" rx="1" fill="#333" stroke="#1E40AF" stroke-width="0.8"/>

  <!-- Clamp split line (the parting plane between upper and lower halves) -->
  <line x1="56" y1="233" x2="72" y2="233" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="242" y1="233" x2="258" y2="233" stroke="#888" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- ── Labels (front view) ── -->
  <line x1="62"  y1="208" x2="30"  y2="191" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="11"   y="189"  font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <!-- Upper clamp label -->
  <line x1="56"  y1="179" x2="14"  y2="165" stroke="#1E40AF" stroke-width="0.8" marker-end="url(#ba)"/>
  <text x="10"   y="162"  font-family="Arial,sans-serif" font-size="8.5" fill="#1E40AF" font-weight="700">UPPER</text>
  <text x="10"   y="173"  font-family="Arial,sans-serif" font-size="8.5" fill="#1E40AF" font-weight="700">CLAMP</text>

  <!-- Lower saddle label -->
  <line x1="56"  y1="310" x2="14"  y2="295" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="10"   y="292"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">LOWER</text>
  <text x="10"   y="303"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">SADDLE</text>

  <!-- Bolt label -->
  <line x1="64"  y1="176" x2="14"  y2="222" stroke="#1E40AF" stroke-width="0.8" marker-end="url(#ba)"/>
  <text x="268"  y="217"  font-family="Arial,sans-serif" font-size="8.5" fill="#1E40AF" font-weight="700">BOLT &amp;</text>
  <text x="268"  y="228"  font-family="Arial,sans-serif" font-size="8.5" fill="#1E40AF" font-weight="700">NUT</text>
  <line x1="258" y1="224" x2="268" y2="222" stroke="#1E40AF" stroke-width="0.8"/>

  <!-- ╔══════════════════════════════════════════╗
       ║  END ELEVATION  (right panel)             ║
       ║  Full circular clamp clearly visible      ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam end view -->
  <rect x="408" y="340" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>
  <rect x="458" y="350" width="14"  height="20" fill="#AAAAAA"  stroke="#222" stroke-width="1"/>
  <rect x="408" y="370" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>

  <!-- Clamp base plate (end view) -->
  <rect x="413" y="326" width="100" height="14" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- FULL CIRCULAR CLAMP (end view) — outer ring then pipe inside -->
  <!-- Clamp outer: r=62, inner: r=47 (12px thick shell) -->
  <!-- Lower half (below centreline, y>233) -->
  <path d="M 401,233 A 62,62 0 0 0 525,233 Z" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>
  <!-- Upper half -->
  <path d="M 401,233 A 62,62 0 0 1 525,233 Z" fill="url(#ch)" stroke="#222" stroke-width="1.2"/>

  <!-- Pipe circle (inside clamp) -->
  <circle cx="463" cy="233" r="47" fill="url(#pg)" stroke="#4A6A8A" stroke-width="1.5"/>
  <circle cx="463" cy="233" r="41" fill="none"     stroke="#7A9AB8" stroke-width="0.7" stroke-dasharray="2,2"/>
  <ellipse cx="447" cy="216" rx="12" ry="8" fill="rgba(255,255,255,0.46)"/>
  <line x1="463" y1="192" x2="463" y2="274" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>
  <line x1="401" y1="233" x2="525" y2="233" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Bolt circles on left and right of clamp (at split line) -->
  <!-- Left bolt (x=401) -->
  <circle cx="401" cy="233" r="7"  fill="#333" stroke="#1E40AF" stroke-width="1.5"/>
  <circle cx="401" cy="233" r="3"  fill="#1E40AF"/>
  <!-- Right bolt -->
  <circle cx="525" cy="233" r="7"  fill="#333" stroke="#1E40AF" stroke-width="1.5"/>
  <circle cx="525" cy="233" r="3"  fill="#1E40AF"/>
  <!-- Split line (horizontal dashed through bolt circles) -->
  <line x1="408" y1="233" x2="518" y2="233" stroke="#888" stroke-width="0.7" stroke-dasharray="3,2"/>

  <!-- ── Labels (end view) ── -->
  <line x1="504" y1="216" x2="530" y2="203" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="533" y="201" font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <line x1="525" y1="226" x2="548" y2="210" stroke="#1E40AF" stroke-width="0.8" marker-end="url(#ba)"/>
  <text x="551" y="208" font-family="Arial,sans-serif" font-size="8.5" fill="#1E40AF" font-weight="700">BOLT</text>

  <line x1="480" y1="171" x2="500" y2="158" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="502" y="156" font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">CLAMP</text>

  <!-- Note -->
  <text x="318" y="362" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NOTE: TWO-PIECE BOLTED CLAMP — NO WELDING TO PIPE.</text>
  <text x="318" y="372" font-family="Arial,sans-serif" font-size="7.5" fill="#1E40AF">UPPER + LOWER HALVES JOINED BY BOLTS ON EACH SIDE.</text>
  <text x="318" y="381" font-family="Arial,sans-serif" font-size="7.5" fill="#666">CLAMP RESTS ON BASEPLATE ON STRUCTURAL STEEL.</text>

  <!-- Title block -->
  <rect x="4" y="388" width="612" height="28" fill="#003087"/>
  <text x="310" y="407" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">SHOE CLAMP — CLAMPED  (SC)</text>
</svg>
