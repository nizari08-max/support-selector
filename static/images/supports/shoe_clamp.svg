<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="shoe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>

  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>

  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam -->
  <rect x="68" y="222" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="232" width="16" height="20" fill="#374151"/>
  <rect x="68" y="252" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Shoe base plate -->
  <rect x="122" y="208" width="136" height="14" rx="2" fill="url(#shoe)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Shoe sides -->
  <rect x="122" y="178" width="16" height="30" rx="1" fill="url(#shoe)" stroke="#001F5C" stroke-width="1.5"/>
  <rect x="242" y="178" width="16" height="30" rx="1" fill="url(#shoe)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Saddle seat -->
  <path d="M 138,178 Q 190,198 242,178" fill="none" stroke="#1B4DB8" stroke-width="2.5"/>

  <!-- Pipe — cy=114 -->
  <circle cx="190" cy="114" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="96" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="99" x2="190" y2="129" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="114" x2="205" y2="114" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- U-bolt left -->
  <path d="M 155,208 L 155,90 Q 155,78 168,78 Q 190,78 212,78 Q 225,78 225,90 L 225,208"
        fill="none" stroke="#1E3A8A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- U-bolt highlight -->
  <path d="M 155,208 L 155,90 Q 155,78 168,78 Q 190,78 212,78 Q 225,78 225,90 L 225,208"
        fill="none" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Nut symbols at top -->
  <rect x="148" y="74" width="14" height="10" rx="2" fill="#1E3A8A" stroke="#60A5FA" stroke-width="1"/>
  <rect x="218" y="74" width="14" height="10" rx="2" fill="#1E3A8A" stroke="#60A5FA" stroke-width="1"/>
  <!-- Bolt washers at bottom -->
  <rect x="148" y="207" width="14" height="10" rx="2" fill="#374151" stroke="#60A5FA" stroke-width="1"/>
  <rect x="218" y="207" width="14" height="10" rx="2" fill="#374151" stroke="#60A5FA" stroke-width="1"/>

  <!-- Label callout -->
  <text x="300" y="120" font-family="'Arial',sans-serif" font-size="8.5" fill="#1E3A8A" font-weight="700">SC01–SC09</text>
  <line x1="258" y1="115" x2="296" y2="117" stroke="#1E3A8A" stroke-width="0.8"/>

  <rect x="68" y="264" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="280" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">SHOE CLAMP / SADDLE</text>
</svg>
