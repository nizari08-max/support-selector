<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420">
  <defs>
    <pattern id="h" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#555" stroke-width="0.65"/>
    </pattern>
    <!-- Shoe / steel member hatching -->
    <pattern id="sh" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#334" stroke-width="0.8"/>
    </pattern>
    <radialGradient id="pg" cx="34%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#E4EEF8"/>
      <stop offset="100%" stop-color="#7A96B2"/>
    </radialGradient>
    <!-- Shoe gradient: darker steel -->
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8AA0B8"/>
      <stop offset="100%" stop-color="#4A6080"/>
    </linearGradient>
    <marker id="a"  markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#222"/>
    </marker>
    <marker id="wa" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0,0 0,5 5,2.5" fill="#CC2200"/>
    </marker>
  </defs>

  <rect width="620" height="420" fill="#FAFAFA"/>
  <rect x="4" y="4" width="612" height="412" fill="none" stroke="#333" stroke-width="1.2"/>
  <rect x="8" y="8" width="604" height="376" fill="none" stroke="#BBB" stroke-width="0.4"/>
  <line x1="312" y1="12" x2="312" y2="382" stroke="#CCC" stroke-width="0.8" stroke-dasharray="5,3"/>

  <text x="159" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">FRONT ELEVATION</text>
  <text x="463" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#555" letter-spacing="1.5">END ELEVATION</text>
  <line x1="93"  y1="24" x2="225" y2="24" stroke="#AAA" stroke-width="0.5"/>
  <line x1="398" y1="24" x2="528" y2="24" stroke="#AAA" stroke-width="0.5"/>

  <!-- ╔══════════════════════════════════════════════════════╗
       ║  FRONT ELEVATION                                      ║
       ║  U-saddle welded to pipe; shoe base plate on beam     ║
       ╚══════════════════════════════════════════════════════╝ -->

  <!-- I-beam -->
  <rect x="28"  y="340" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>
  <rect x="150" y="350" width="14"  height="20" fill="#AAAAAA" stroke="#222" stroke-width="1"/>
  <rect x="28"  y="370" width="256" height="10" fill="url(#h)" stroke="#222" stroke-width="1"/>

  <!-- Shoe assembly (front view):
       Base plate: y=326–340, x=56–258
       Left web:   y=290–326, x=56–74
       Right web:  y=290–326, x=240–258
       (the curved saddle sits at pipe bottom y=318 but in front view
        we show it as the bottom outline of the pipe touching the shoe tops) -->
  <!-- Base plate -->
  <rect x="56" y="326" width="202" height="14" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>
  <!-- Left vertical web plate -->
  <rect x="56" y="285" width="16" height="41" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>
  <!-- Right vertical web plate -->
  <rect x="242" y="285" width="16" height="41" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>

  <!-- Pipe (side view): bottom at y=285, r=47, cy=238 -->
  <!-- NOTE: shoe webs extend to pipe bottom — pipe bottom is at shoe web tops -->
  <rect x="62" y="238" width="188" height="94" fill="url(#pg)"/>
  <!-- Actually: pipe bottom = shoe web top = y=285. cy = 285-47 = 238 -->
  <line x1="62" y1="191" x2="250" y2="191" stroke="#4A6A8A" stroke-width="1.5"/>
  <line x1="62" y1="285" x2="250" y2="285" stroke="#4A6A8A" stroke-width="1.5"/>
  <!-- Redefine pipe body with correct bounds: top y=191, bottom y=285, center y=238, r=47 -->
  <rect x="62" y="191" width="188" height="94" fill="url(#pg)"/>
  <line x1="62" y1="191" x2="250" y2="191" stroke="#4A6A8A" stroke-width="1.5"/>
  <line x1="62" y1="285" x2="250" y2="285" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="62"  cy="238" rx="7" ry="47" fill="#AABCCE" stroke="#4A6A8A" stroke-width="1.5"/>
  <ellipse cx="250" cy="238" rx="7" ry="47" fill="none"    stroke="#7A9AB8" stroke-width="1"   stroke-dasharray="3,2"/>
  <rect x="68" y="193" width="175" height="14" rx="7" fill="rgba(255,255,255,0.40)"/>
  <!-- Pipe centreline -->
  <line x1="40" y1="238" x2="268" y2="238" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- WELD symbols: small filled triangles where shoe web meets pipe bottom -->
  <!-- Left weld (shoe left web top meets pipe bottom-left) -->
  <polygon points="62,285 56,295 72,295" fill="#CC2200" opacity="0.85"/>
  <!-- Right weld -->
  <polygon points="250,285 244,295 258,295" fill="#CC2200" opacity="0.85"/>
  <!-- Curved saddle suggestion line (dashed arc from shoe left web to right web at pipe) -->
  <path d="M 72,285 Q 156,300 242,285" fill="none" stroke="#4A6A8A" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- ── Labels (front view) ── -->
  <line x1="62"  y1="213" x2="30"  y2="196" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="11"   y="194"  font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <!-- Weld callout -->
  <line x1="62"  y1="285" x2="14"  y2="271" stroke="#CC2200" stroke-width="0.8" marker-end="url(#wa)"/>
  <text x="10"   y="268"  font-family="Arial,sans-serif" font-size="8.5" fill="#CC2200" font-weight="700">WELD</text>
  <text x="10"   y="279"  font-family="Arial,sans-serif" font-size="7.5" fill="#CC2200">(FILLET)</text>

  <!-- Shoe plate callout -->
  <line x1="56"  y1="333" x2="14"  y2="319" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="10"   y="316"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">SHOE</text>
  <text x="10"   y="327"  font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">BASE PLATE</text>

  <line x1="28"  y1="351" x2="278" y2="369" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="270"  y="374"  font-family="Arial,sans-serif" font-size="8"   fill="#333">I-BEAM</text>

  <!-- ╔══════════════════════════════════════════╗
       ║  END ELEVATION  (right panel)             ║
       ║  U-saddle shape clearly visible           ║
       ╚══════════════════════════════════════════╝ -->

  <!-- I-beam end view -->
  <rect x="408" y="340" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>
  <rect x="458" y="350" width="14"  height="20" fill="#AAAAAA"  stroke="#222" stroke-width="1"/>
  <rect x="408" y="370" width="110" height="10" fill="url(#h)"  stroke="#222" stroke-width="1"/>

  <!-- Shoe (end view): U-shape visible -->
  <!-- Base plate -->
  <rect x="413" y="326" width="100" height="14" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>
  <!-- Left web -->
  <rect x="413" y="285" width="15"  height="41" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>
  <!-- Right web -->
  <rect x="498" y="285" width="15"  height="41" fill="url(#sh)" stroke="#222" stroke-width="1.2"/>
  <!-- Saddle arc at pipe bottom (the curved cradle) -->
  <path d="M 428,285 Q 463,302 498,285" fill="none" stroke="#334477" stroke-width="2"/>

  <!-- Pipe circle: bottom at y=285, cy=238, r=47 -->
  <circle cx="463" cy="238" r="47" fill="url(#pg)" stroke="#4A6A8A" stroke-width="1.5"/>
  <circle cx="463" cy="238" r="41" fill="none"     stroke="#7A9AB8" stroke-width="0.7" stroke-dasharray="2,2"/>
  <ellipse cx="447" cy="221" rx="12" ry="8" fill="rgba(255,255,255,0.46)"/>
  <line x1="463" y1="197" x2="463" y2="279" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>
  <line x1="422" y1="238" x2="504" y2="238" stroke="#0044BB" stroke-width="0.9" stroke-dasharray="9,3,2,3"/>

  <!-- Weld symbol at shoe-pipe contact (bottom of pipe circle, each side) -->
  <polygon points="428,285 420,294 436,294" fill="#CC2200" opacity="0.85"/>
  <polygon points="498,285 490,294 506,294" fill="#CC2200" opacity="0.85"/>

  <!-- ── Labels (end view) ── -->
  <line x1="504" y1="221" x2="528" y2="208" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="531" y="206" font-family="Arial,sans-serif" font-size="9"   fill="#111" font-weight="700">PIPE</text>

  <line x1="413" y1="300" x2="382" y2="290" stroke="#222" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="320" y="287" font-family="Arial,sans-serif" font-size="8.5" fill="#334477" font-weight="700">SHOE WEB</text>

  <line x1="463" y1="298" x2="490" y2="316" stroke="#334477" stroke-width="0.8" marker-end="url(#a)"/>
  <text x="492" y="321" font-family="Arial,sans-serif" font-size="8" fill="#334477">SADDLE</text>

  <line x1="420" y1="290" x2="400" y2="304" stroke="#CC2200" stroke-width="0.8" marker-end="url(#wa)"/>
  <text x="320" y="311" font-family="Arial,sans-serif" font-size="8.5" fill="#CC2200" font-weight="700">WELD</text>

  <!-- Note -->
  <text x="318" y="360" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NOTE: SADDLE WELDED DIRECTLY TO PIPE.</text>
  <text x="318" y="370" font-family="Arial,sans-serif" font-size="7.5" fill="#666">NO BOLTS — DISTINGUISHED FROM CLAMP TYPE.</text>
  <text x="318" y="381" font-family="Arial,sans-serif" font-size="7.5" fill="#CC2200">▲ WELD SYMBOLS SHOWN AT SHOE-TO-PIPE JUNCTION.</text>

  <!-- Title block -->
  <rect x="4" y="388" width="612" height="28" fill="#003087"/>
  <text x="310" y="407" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">PIPE SHOE — WELDED  (SH)</text>
</svg>
