<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="shoe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
    <marker id="slide_arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#60A5FA"/>
    </marker>
    <marker id="slide_arr_l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 z" fill="#60A5FA"/>
    </marker>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>
  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>
  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam structural steel — top flange at y=220 -->
  <rect x="68" y="220" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="230" width="16" height="18" fill="#374151"/>
  <rect x="68" y="248" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Shoe sole plate — slides on I-beam top flange -->
  <rect x="116" y="208" width="148" height="12" rx="2" fill="url(#shoe)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Sole plate surface (machined for sliding) -->
  <g stroke="rgba(255,255,255,0.18)" stroke-width="1">
    <line x1="126" y1="208" x2="116" y2="220"/><line x1="141" y1="208" x2="128" y2="220"/>
    <line x1="156" y1="208" x2="143" y2="220"/><line x1="171" y1="208" x2="158" y2="220"/>
    <line x1="186" y1="208" x2="173" y2="220"/><line x1="201" y1="208" x2="188" y2="220"/>
    <line x1="216" y1="208" x2="203" y2="220"/><line x1="231" y1="208" x2="218" y2="220"/>
    <line x1="246" y1="208" x2="233" y2="220"/><line x1="261" y1="210" x2="248" y2="220"/>
  </g>

  <!-- Shoe side webs — vertical side plates connecting saddle to sole plate -->
  <rect x="116" y="172" width="18" height="36" rx="1" fill="url(#shoe)" stroke="#001F5C" stroke-width="1.5"/>
  <rect x="246" y="172" width="18" height="36" rx="1" fill="url(#shoe)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Shoe saddle — curved plate welded to pipe OD bottom -->
  <!-- Pipe cy=108, r=64 → bottom at y=172 -->
  <!-- Saddle inner follows pipe OD (r=64), outer r=73 (9px), arc ±50° from bottom -->
  <!-- inner ±50°: x=190±49=141,239; y=108+41=149 -->
  <!-- outer ±50°: x=190±55.9=134,246; y=108+46.9=155 -->
  <path d="M 141,149 A 64 64 0 0 1 239,149 L 246,155 A 73 73 0 0 0 134,155 Z"
        fill="url(#shoe)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Weld symbols (triangle) at saddle-to-side-web junction -->
  <polygon points="134,172 128,184 140,184" fill="#EF4444" opacity="0.8"/>
  <polygon points="246,172 240,184 252,184" fill="#EF4444" opacity="0.8"/>
  <!-- Fillet weld indicator label -->
  <text x="16" y="179" font-family="'Arial',sans-serif" font-size="8" fill="#EF4444" font-weight="600">WELD</text>
  <line x1="44" y1="178" x2="127" y2="178" stroke="#EF4444" stroke-width="0.7" stroke-dasharray="3,2"/>

  <!-- Pipe — cy=108, r=64 -->
  <circle cx="190" cy="108" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="90" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="93" x2="190" y2="123" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="108" x2="205" y2="108" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Sliding freedom arrows at sole plate bottom edge -->
  <line x1="160" y1="226" x2="140" y2="226" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#slide_arr_l)"/>
  <line x1="220" y1="226" x2="240" y2="226" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#slide_arr)"/>
  <text x="167" y="237" font-family="'Arial',sans-serif" font-size="7.5" fill="#60A5FA" font-weight="600" text-anchor="middle">SLIDES FREELY</text>

  <!-- Labels -->
  <text x="296" y="104" font-family="'Arial',sans-serif" font-size="8.5" fill="#475569" font-weight="700">PIPE</text>
  <line x1="256" y1="100" x2="293" y2="102" stroke="#475569" stroke-width="0.8"/>

  <text x="296" y="148" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="700">SADDLE</text>
  <text x="296" y="158" font-family="'Arial',sans-serif" font-size="7" fill="#003087">(WELDED TO PIPE)</text>
  <line x1="246" y1="152" x2="293" y2="150" stroke="#003087" stroke-width="0.8"/>

  <text x="296" y="200" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="700">SOLE PLATE</text>
  <text x="296" y="210" font-family="'Arial',sans-serif" font-size="7" fill="#003087">SH01–SH05</text>
  <line x1="264" y1="214" x2="293" y2="204" stroke="#003087" stroke-width="0.8"/>

  <rect x="68" y="262" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="278" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">PIPE SHOE (WELDED)</text>
</svg>
