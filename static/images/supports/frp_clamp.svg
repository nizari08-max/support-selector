<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <!-- FRP pipe gradient — green/teal -->
    <radialGradient id="frppg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="clamp_g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
    <!-- Soft insert — orange, critical for FRP to prevent crushing -->
    <linearGradient id="insert_g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <marker id="slide_arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#60A5FA"/>
    </marker>
    <marker id="slide_arr_l" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 z" fill="#60A5FA"/>
    </marker>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>
  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>
  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam structural steel — top flange at y=216 -->
  <rect x="68" y="216" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="226" width="16" height="18" fill="#374151"/>
  <rect x="68" y="244" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Base plate of clamp -->
  <rect x="110" y="204" width="160" height="12" rx="2" fill="url(#clamp_g)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- Sliding lines on base plate -->
  <g stroke="rgba(255,255,255,0.18)" stroke-width="1">
    <line x1="120" y1="204" x2="110" y2="216"/><line x1="135" y1="204" x2="122" y2="216"/>
    <line x1="150" y1="204" x2="137" y2="216"/><line x1="165" y1="204" x2="152" y2="216"/>
    <line x1="180" y1="204" x2="167" y2="216"/><line x1="195" y1="204" x2="182" y2="216"/>
    <line x1="210" y1="204" x2="197" y2="216"/><line x1="225" y1="204" x2="212" y2="216"/>
    <line x1="240" y1="204" x2="227" y2="216"/><line x1="255" y1="205" x2="242" y2="216"/>
    <line x1="269" y1="207" x2="257" y2="216"/>
  </g>

  <!-- Clamp LOWER half — steel outer shell, soft insert inner -->
  <!-- FRP pipe cy=138, r=62 → bottom at y=200 -->
  <!-- Lower half: from pipe equator (y=138) downward, ±180° sweep (lower semicircle) -->
  <!-- Soft insert lower half: inner r=62 (pipe OD), outer r=70 (8px thick) -->
  <!-- Steel shell lower: inner r=70, outer r=80 -->
  <!-- Lower soft insert: draw arc from pipe equator around to equator on right side (clockwise) -->
  <path d="M 128,138 A 62 62 0 0 0 252,138 L 258,138 A 68 68 0 0 1 122,138 Z"
        fill="url(#insert_g)" stroke="#C2410C" stroke-width="1"/>
  <!-- Lower steel shell -->
  <path d="M 122,138 A 68 68 0 0 0 258,138 L 264,138 A 74 74 0 0 1 116,138 Z"
        fill="url(#clamp_g)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- FRP Pipe — cy=138, r=62 -->
  <circle cx="190" cy="138" r="62" fill="url(#frppg)" stroke="#059669" stroke-width="2.5"/>
  <!-- FRP laminate layer suggestion -->
  <circle cx="190" cy="138" r="54" fill="none" stroke="rgba(5,150,105,0.18)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Shine -->
  <ellipse cx="173" cy="120" rx="18" ry="12" fill="rgba(255,255,255,0.5)"/>
  <line x1="190" y1="123" x2="190" y2="153" stroke="#34D399" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="138" x2="205" y2="138" stroke="#34D399" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Clamp UPPER half (drawn last so it overlays the pipe top half) -->
  <path d="M 128,138 A 62 62 0 0 1 252,138 L 258,138 A 68 68 0 0 0 122,138 Z"
        fill="url(#insert_g)" stroke="#C2410C" stroke-width="1"/>
  <path d="M 122,138 A 68 68 0 0 1 258,138 L 264,138 A 74 74 0 0 0 116,138 Z"
        fill="url(#clamp_g)" stroke="#001F5C" stroke-width="1.5"/>

  <!-- Clamp bolt assemblies — both sides -->
  <!-- Right bolt plate -->
  <rect x="258" y="104" width="22" height="68" rx="4" fill="url(#clamp_g)" stroke="#001F5C" stroke-width="1.5"/>
  <circle cx="269" cy="122" r="5.5" fill="#374151" stroke="#60A5FA" stroke-width="1.2"/>
  <circle cx="269" cy="154" r="5.5" fill="#374151" stroke="#60A5FA" stroke-width="1.2"/>
  <!-- Left bolt plate -->
  <rect x="100" y="104" width="22" height="68" rx="4" fill="url(#clamp_g)" stroke="#001F5C" stroke-width="1.5"/>
  <circle cx="111" cy="122" r="5.5" fill="#374151" stroke="#60A5FA" stroke-width="1.2"/>
  <circle cx="111" cy="154" r="5.5" fill="#374151" stroke="#60A5FA" stroke-width="1.2"/>

  <!-- Sliding arrows at base plate -->
  <line x1="160" y1="220" x2="140" y2="220" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#slide_arr_l)"/>
  <line x1="220" y1="220" x2="240" y2="220" stroke="#60A5FA" stroke-width="1.5" marker-end="url(#slide_arr)"/>
  <text x="167" y="232" font-family="'Arial',sans-serif" font-size="7.5" fill="#60A5FA" font-weight="600" text-anchor="middle">SLIDES FREELY</text>

  <!-- Labels -->
  <text x="14" y="126" font-family="'Arial',sans-serif" font-size="8.5" fill="#059669" font-weight="700">FRP PIPE</text>
  <line x1="64" y1="124" x2="128" y2="120" stroke="#059669" stroke-width="0.8"/>

  <text x="14" y="178" font-family="'Arial',sans-serif" font-size="8.5" fill="#EA580C" font-weight="700">SOFT INSERT</text>
  <text x="14" y="188" font-family="'Arial',sans-serif" font-size="7" fill="#EA580C">(GRP/RUBBER)</text>
  <line x1="76" y1="182" x2="122" y2="170" stroke="#EA580C" stroke-width="0.8"/>

  <text x="14" y="108" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="700">CLAMP BOLT</text>
  <line x1="70" y1="108" x2="100" y2="118" stroke="#003087" stroke-width="0.8"/>

  <text x="296" y="152" font-family="'Arial',sans-serif" font-size="8.5" fill="#003087" font-weight="700">CF01–CF03</text>
  <text x="296" y="162" font-family="'Arial',sans-serif" font-size="7" fill="#003087">FRP CLAMP SHOE</text>
  <line x1="280" y1="148" x2="293" y2="150" stroke="#003087" stroke-width="0.8"/>

  <rect x="68" y="258" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="274" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">FRP CLAMP SHOE (CF)</text>
</svg>
