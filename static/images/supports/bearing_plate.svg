<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4DB8"/>
      <stop offset="100%" stop-color="#003087"/>
    </linearGradient>
    <linearGradient id="og" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>
  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>
  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam structural steel — top flange at y=218 -->
  <rect x="68" y="218" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="228" width="16" height="17" fill="#374151"/>
  <rect x="68" y="245" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- LAYER 3 — Isolation Pad (PR01/PR02): y=205 to y=218, orange/rubber, electrical isolation -->
  <rect x="118" y="205" width="144" height="13" rx="1" fill="url(#ig)" stroke="#C2410C" stroke-width="1.5"/>
  <!-- rubber/neoprene hatch texture -->
  <g stroke="rgba(194,65,12,0.35)" stroke-width="1">
    <line x1="124" y1="205" x2="124" y2="218"/><line x1="134" y1="205" x2="134" y2="218"/>
    <line x1="144" y1="205" x2="144" y2="218"/><line x1="154" y1="205" x2="154" y2="218"/>
    <line x1="164" y1="205" x2="164" y2="218"/><line x1="174" y1="205" x2="174" y2="218"/>
    <line x1="184" y1="205" x2="184" y2="218"/><line x1="194" y1="205" x2="194" y2="218"/>
    <line x1="204" y1="205" x2="204" y2="218"/><line x1="214" y1="205" x2="214" y2="218"/>
    <line x1="224" y1="205" x2="224" y2="218"/><line x1="234" y1="205" x2="234" y2="218"/>
    <line x1="244" y1="205" x2="244" y2="218"/><line x1="254" y1="205" x2="254" y2="218"/>
  </g>

  <!-- LAYER 2 — Bearing Plate (BP02): y=193 to y=205, machined steel plate -->
  <rect x="126" y="193" width="128" height="12" rx="1" fill="url(#bg)" stroke="#001F5C" stroke-width="1.5"/>
  <!-- machined surface texture lines -->
  <g stroke="rgba(255,255,255,0.22)" stroke-width="1">
    <line x1="136" y1="193" x2="126" y2="205"/><line x1="151" y1="193" x2="138" y2="205"/>
    <line x1="166" y1="193" x2="153" y2="205"/><line x1="181" y1="193" x2="168" y2="205"/>
    <line x1="196" y1="193" x2="183" y2="205"/><line x1="211" y1="193" x2="198" y2="205"/>
    <line x1="226" y1="193" x2="213" y2="205"/><line x1="241" y1="193" x2="228" y2="205"/>
    <line x1="254" y1="194" x2="244" y2="205"/>
  </g>

  <!-- LAYER 1 — Wear Pad (WA01): arc bonded to pipe OD bottom -->
  <!-- Pipe cy=123, r=62 → pipe bottom=185; wear pad thickness=8 → outer bottom=193 -->
  <!-- Arc ±60° from bottom: inner(136,154)→(244,154); outer(129,158)→(251,158) -->
  <path d="M 136,154 A 62 62 0 0 1 244,154 L 251,158 A 70 70 0 0 0 129,158 Z"
        fill="url(#og)" stroke="#C2410C" stroke-width="1.5"/>
  <g stroke="rgba(255,255,255,0.28)" stroke-width="1">
    <line x1="140" y1="157" x2="136" y2="167"/><line x1="154" y1="162" x2="150" y2="173"/>
    <line x1="169" y1="165" x2="166" y2="177"/><line x1="185" y1="167" x2="183" y2="179"/>
    <line x1="201" y1="167" x2="199" y2="179"/><line x1="217" y1="165" x2="215" y2="177"/>
    <line x1="232" y1="162" x2="231" y2="173"/><line x1="246" y1="157" x2="245" y2="167"/>
  </g>

  <!-- Pipe (steel) — cy=123, r=62 -->
  <circle cx="190" cy="123" r="62" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="106" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="108" x2="190" y2="138" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="123" x2="205" y2="123" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Component labels — right side -->
  <text x="268" y="118" font-family="'Arial',sans-serif" font-size="8.5" fill="#475569" font-weight="700">STEEL PIPE</text>
  <line x1="254" y1="114" x2="265" y2="116" stroke="#475569" stroke-width="0.8"/>

  <text x="268" y="162" font-family="'Arial',sans-serif" font-size="8.5" fill="#EA580C" font-weight="700">WA01</text>
  <text x="268" y="172" font-family="'Arial',sans-serif" font-size="7" fill="#EA580C">WEAR PAD</text>
  <line x1="252" y1="159" x2="265" y2="161" stroke="#EA580C" stroke-width="0.8"/>

  <text x="268" y="198" font-family="'Arial',sans-serif" font-size="8.5" fill="#1B4DB8" font-weight="700">BP02</text>
  <text x="268" y="208" font-family="'Arial',sans-serif" font-size="7" fill="#1B4DB8">BEARING PLATE</text>
  <line x1="254" y1="199" x2="265" y2="199" stroke="#1B4DB8" stroke-width="0.8"/>

  <text x="268" y="214" font-family="'Arial',sans-serif" font-size="8.5" fill="#C2410C" font-weight="700">PR01/PR02</text>
  <text x="268" y="224" font-family="'Arial',sans-serif" font-size="7" fill="#C2410C">ISOLATION PAD</text>
  <line x1="262" y1="211" x2="265" y2="213" stroke="#C2410C" stroke-width="0.8"/>

  <!-- Title banner -->
  <rect x="68" y="260" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="275" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="10" font-weight="700"
        fill="white" letter-spacing="0.8">BP02 / PR01-PR02 / WA01</text>
</svg>
