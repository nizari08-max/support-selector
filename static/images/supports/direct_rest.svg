<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290">
  <defs>
    <radialGradient id="pg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#E8ECF4"/>
      <stop offset="100%" stop-color="#8FA0BB"/>
    </radialGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <marker id="load_arr" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0,0 L4,8 L8,0 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="380" height="290" fill="#EEF2F7" rx="12"/>
  <g stroke="#D1D5DB" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="72" x2="380" y2="72"/>
    <line x1="0" y1="144" x2="380" y2="144"/>
    <line x1="0" y1="216" x2="380" y2="216"/>
    <line x1="95" y1="0" x2="95" y2="290"/>
    <line x1="190" y1="0" x2="190" y2="290"/>
    <line x1="285" y1="0" x2="285" y2="290"/>
  </g>
  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="#94A3B8" letter-spacing="1">END ELEVATION</text>

  <!-- I-beam structural steel — top flange at y=212 -->
  <rect x="68" y="212" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>
  <rect x="182" y="222" width="16" height="20" fill="#374151"/>
  <rect x="68" y="242" width="244" height="10" rx="2" fill="url(#sg)" stroke="#374151" stroke-width="0.5"/>

  <!-- Pipe — sits directly on I-beam top flange (cy=148, r=64, bottom at y=212) -->
  <circle cx="190" cy="148" r="64" fill="url(#pg)" stroke="#64748B" stroke-width="2.5"/>
  <ellipse cx="172" cy="130" rx="20" ry="13" fill="rgba(255,255,255,0.4)"/>
  <line x1="190" y1="133" x2="190" y2="163" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="175" y1="148" x2="205" y2="148" stroke="#8FA0BB" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Gravity / load arrow from pipe centre down to I-beam -->
  <line x1="190" y1="160" x2="190" y2="208" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#load_arr)"/>
  <text x="196" y="192" font-family="'Arial',sans-serif" font-size="8" fill="#94A3B8" font-weight="600">LOAD</text>

  <!-- Red contact triangle at tangent point -->
  <polygon points="183,212 190,203 197,212" fill="#EF4444" opacity="0.85"/>

  <!-- Annotations -->
  <text x="210" y="208" font-family="'Arial',sans-serif" font-size="8.5" fill="#EF4444" font-weight="700">DIRECT</text>
  <text x="210" y="219" font-family="'Arial',sans-serif" font-size="8.5" fill="#EF4444" font-weight="700">CONTACT</text>
  <line x1="208" y1="211" x2="199" y2="212" stroke="#EF4444" stroke-width="0.8"/>

  <text x="16" y="210" font-family="'Arial',sans-serif" font-size="8" fill="#64748B" font-weight="600">NO SHOE</text>
  <text x="16" y="221" font-family="'Arial',sans-serif" font-size="8" fill="#64748B" font-weight="600">NO PAD</text>

  <!-- Pipe label -->
  <text x="300" y="142" font-family="'Arial',sans-serif" font-size="8.5" fill="#475569" font-weight="700">PIPE</text>
  <line x1="256" y1="138" x2="297" y2="140" stroke="#475569" stroke-width="0.8"/>

  <!-- Structural steel label -->
  <text x="300" y="219" font-family="'Arial',sans-serif" font-size="8.5" fill="#374151" font-weight="700">STR. STEEL</text>
  <line x1="314" y1="212" x2="314" y2="216" stroke="#374151" stroke-width="0.8"/>

  <rect x="68" y="260" width="244" height="22" rx="4" fill="#003087"/>
  <text x="190" y="276" text-anchor="middle"
        font-family="'Arial',sans-serif" font-size="11" font-weight="700"
        fill="white" letter-spacing="1.5">DIRECT REST</text>
</svg>
